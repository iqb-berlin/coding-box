services:
  keycloak-db:
    image: postgres:14
    restart: always
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${KEYCLOAK_DB_NAME}", "-U", "${KEYCLOAK_DB_USER}" ]
      interval: 10s
      timeout: 3s
      start_period: 60s
      start_interval: 1s
      retries: 5
    environment:
      POSTGRES_HOST: keycloak-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
    volumes:
      - "keycloak_db_vol:/var/lib/postgresql/data"
    networks:
      - application-network

  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    restart: always
    depends_on:
      keycloak-db:
        condition: service_healthy
    command: [ 'start', '--import-realm' ]
    ports:
      - "8080:8080"
    environment:
      KC_HOSTNAME: ${SERVER_NAME}
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${ADMIN_NAME}
      KEYCLOAK_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      KEYCLOAK_LOGLEVEL: DEBUG
    env_file:
      - ./config/keycloak/realm/coding-box-realm.config
    volumes:
      - "./config/keycloak/realm/coding-box-realm.json:/opt/keycloak/data/import/coding-box-realm.json"
      - "./config/keycloak/themes/iqb:/opt/keycloak/themes/iqb"
    networks:
      - application-network

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  db:
    build:
      context: .
      dockerfile: database/Postgres.Dockerfile
      args:
        REGISTRY_PATH: ${REGISTRY_PATH}
    ports:
      - "${POSTGRES_PORT}:5432"

  liquibase:
    build:
      context: .
      dockerfile: database/Liquibase.Dockerfile
      target: base
      args:
        REGISTRY_PATH: ${REGISTRY_PATH}
    volumes:
      - "./database/changelog:/liquibase/changelog"
      - "./database/changelogDocs:/liquibase/changelogDocs"

  backend:
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.rule=HostRegexp(`www.${SERVER_NAME}`) || Host(`${SERVER_NAME}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.service=backend"
      - "traefik.http.services.backend.loadbalancer.server.port=3333"
      - "traefik.docker.network=app-net"
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
      args:
        REGISTRY_PATH: ${REGISTRY_PATH}
        PROJECT: backend
    depends_on:
      - keycloak
    ports:
      - "${API_PORT}:3333"  # backend
      - "9229:9229"         # default debug port
    volumes:
      - "./apps/backend/src:/usr/src/coding-box-base/apps/backend/src"
      - "./api-dto:/usr/src/coding-box-base/api-dto"
      - "backend_vol:/usr/src/coding-box/packages"
    command:
      - "serve"
      - "backend"
      - "--host=backend"

  frontend:
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.rule=HostRegexp(`www.${SERVER_NAME}`) || Host(`${SERVER_NAME}`)"
      - "traefik.http.routers.frontend.service=frontend"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
      - "traefik.docker.network=app-net"
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
      args:
        REGISTRY_PATH: ${REGISTRY_PATH}
        PROJECT: frontend
    ports:
      - "${HTTP_PORT}:8080"
    volumes:
      - "./apps/frontend/src:/usr/src/coding-box-base/apps/frontend/src"
      - "./api-dto:/usr/src/coding-box-base/api-dto"
    command:
      - "serve"
      - "frontend"
      - "--host=frontend"
      - "--port=8080"

volumes:
  keycloak_db_vol:
