x-env-postgres: &env-postgres
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}

x-env-redis: &env-redis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PREFIX: coding-box

x-env-oidc: &env-oidc
  OIDC_PROVIDER_URL: ${OIDC_PROVIDER_URL}
  OIDC_ISSUER: ${OIDC_ISSUER}
  OIDC_ACCOUNT_ENDPOINT: ${OIDC_ACCOUNT_ENDPOINT}
  OIDC_AUTHORIZATION_ENDPOINT: ${OIDC_AUTHORIZATION_ENDPOINT}
  OIDC_TOKEN_ENDPOINT: ${OIDC_TOKEN_ENDPOINT}
  OIDC_USERINFO_ENDPOINT: ${OIDC_USERINFO_ENDPOINT}
  OIDC_END_SESSION_ENDPOINT: ${OIDC_END_SESSION_ENDPOINT}
  OIDC_JWKS_URI: ${OIDC_JWKS_URI}
  OAUTH2_CLIENT_ID: ${OAUTH2_CLIENT_ID}
  OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
  OAUTH2_REDIRECT_URL: ${OAUTH2_REDIRECT_URL}

x-env-auth-policy: &env-auth-policy
  WORKSPACE_TOKEN_REPLAY_READ_MAX_DURATION_DAYS: ${WORKSPACE_TOKEN_REPLAY_READ_MAX_DURATION_DAYS:-90}
  ALLOW_LEGACY_WORKSPACE_REPLAY_TOKENS: ${ALLOW_LEGACY_WORKSPACE_REPLAY_TOKENS:-true}

services:
  redis:
    image: redis:alpine
    volumes:
      - "redis_data:/data"
    networks:
      - application-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    environment:
      <<: *env-postgres
    volumes:
      - "db_vol:/var/lib/postgresql/data"
    networks:
      - application-network

  liquibase:
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *env-postgres
    command: [
      "liquibase",
      "--url=jdbc:postgresql://db:5432/$POSTGRES_DB",
      "--username=$POSTGRES_USER",
      "--password=$POSTGRES_PASSWORD",
      "--classpath=changelog",
      "--changeLogFile=coding-box.changelog-root.xml",
      "update"
    ]
    networks:
      - application-network

  backend:
    depends_on:
      db:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      APP_ROLE: api
      API_HOST: backend
      HTTP_PORT: ${HTTP_PORT:-4200}
      JWT_SECRET: ${JWT_SECRET}
      GEOGEBRA_BUNDLE_DOWNLOAD_URL: ${GEOGEBRA_BUNDLE_DOWNLOAD_URL:-}
      <<: [ *env-redis, *env-postgres, *env-oidc ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const req=http.get('http://backend:3333/api/health',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(2000,()=>{req.destroy();process.exit(1);});\""
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    networks:
      - application-network

  backend-export-worker:
    depends_on:
      db:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      APP_ROLE: export-worker
      API_HOST: backend-export-worker
      JWT_SECRET: ${JWT_SECRET}
      GEOGEBRA_BUNDLE_DOWNLOAD_URL: ${GEOGEBRA_BUNDLE_DOWNLOAD_URL:-}
      EXPORT_CODING_LIST_BATCH_SIZE: ${EXPORT_CODING_LIST_BATCH_SIZE:-500}
      EXPORT_VERSIONED_BATCH_SIZE: ${EXPORT_VERSIONED_BATCH_SIZE:-250}
      POSTGRES_POOL_MAX: ${EXPORT_WORKER_POSTGRES_POOL_MAX:-4}
      JOB_QUEUE_PROCESSORS: data-export
      PGOPTIONS: ${EXPORT_WORKER_PGOPTIONS:--c jit=off}
      <<: [ *env-redis, *env-postgres, *env-oidc, *env-auth-policy ]
    networks:
      - application-network

  frontend:
    depends_on:
      db:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    networks:
      - application-network

volumes:
  db_vol:
  backend_vol:
  export_temp_vol:
  redis_data:

networks:
  application-network:
    name: app-net
    external: true
